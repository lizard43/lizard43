<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Adster Route Map</title>

  <!-- Leaflet (free) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>

  <link rel="stylesheet" href="./route.css" />
</head>
<body>
  <div id="map"></div>

  <div class="topbar">
    <button id="btnReload">Reload payload</button>
    <div class="meta" id="meta">No payload loaded</div>
  </div>

  <div class="legend" aria-hidden="true">
    <div class="legend-row"><span class="swatch-line"></span><span>route line</span></div>
    <div class="legend-row"><span class="swatch-band"></span><span>corridor band</span></div>
    <div class="legend-row"><span class="swatch"></span><span>ads</span></div>
  </div>

  <script src="./route.js"></script>
</body>
</html>
