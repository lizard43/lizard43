<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Arcade Games Price Guide</title>

  <script src="loader.js"></script>
</head>

<body>
  <header class="topbar" id="topbar" aria-label="Search">
    <div class="searchRow">
      <div class="searchWrap">
        <input id="searchInput" class="searchInput" type="text"
          placeholder="Search title / mfg / date / genre / type / page…" autocomplete="off" />
        <button id="searchClear" class="searchClearIn" title="Clear" aria-label="Clear search">✕</button>
      </div>

      <button id="searchPrev" class="searchBtn searchBtnSm" title="Previous match"
        aria-label="Previous match">◀</button>

      <button id="searchNext" class="searchBtn searchBtnSm" title="Next match" aria-label="Next match">▶</button>
    </div>

    <div id="searchStatus" class="searchStatusLine" aria-live="polite"></div>
  </header>

  <nav class="toolbar-rail" id="rail" aria-label="Navigation">

    <nav class="toolbar-rail" id="rail" aria-label="Navigation">
      <!-- Switch to the other price guide (keeps current search text) -->
      <button id="switchGuide" class="rail-btn rail-switch" type="button" aria-label="Switch price guide"
        title="Switch price guide">
        <svg class="rail-switch-icon" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" focusable="false">
          <!-- Simple $ icon -->
          <path
            d="M12 2v2.1c-2.7.2-4.6 1.7-4.6 4 0 2.1 1.4 3.1 4.4 3.7 2.4.5 3.1 1 3.1 2.1 0 1.2-1.2 2-3 2-1.9 0-3.2-.7-3.5-2.2l-2.2.5c.4 2.2 2.2 3.7 5 3.9V22h2v-2.1c3-.3 4.9-2 4.9-4.3 0-2.4-1.5-3.5-4.7-4.1-2.2-.5-2.8-1-2.8-1.9 0-1 1-1.7 2.6-1.7 1.7 0 2.6.7 2.9 1.9l2.1-.6c-.5-1.9-2.1-3.2-5-3.4V2h-2z" />
        </svg>
      </button>

      <div class="rail-keys" id="railKeys" aria-label="Letter bookmarks">
        <!-- JS populates #, A..Z -->
      </div>
    </nav>

    <div class="rail-keys" id="railKeys" aria-label="Letter bookmarks">
      <!-- JS populates #, A..Z -->
    </div>
  </nav>

  <main class="stage" id="stage">
    <div class="content" id="content">
      <div class="cards" id="cards"></div>
    </div>
    <div id="toast" class="toast" aria-live="polite"></div>
  </main>

  <!-- Image viewer modal -->
  <div id="imgModal" class="imgModal" aria-hidden="true" role="dialog" aria-label="Image viewer">
    <div class="imgModalBackdrop" data-modal-close="1"></div>

    <div class="imgModalPanel" role="document">
      <button id="imgModalClose" class="imgModalClose" title="Close" aria-label="Close">✕</button>
      <div id="imgModalGallery" class="imgModalGallery">
        <img id="imgModalImgPrev" class="imgModalImg imgModalImgSide" alt="" />
        <img id="imgModalImg" class="imgModalImg imgModalImgMain" alt="" />
        <img id="imgModalImgNext" class="imgModalImg imgModalImgSide" alt="" />
      </div>
      <div id="imgModalCaption" class="imgModalCaption"></div>
    </div>
  </div>

</body>

</html>
