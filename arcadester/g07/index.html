<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Electrohome G07 Guide</title>

  <!-- GitHub Markdown styling -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.8.1/github-markdown-light.min.css">

  <style>
    body {
      margin: 0;
      background: #ffffff;
      color: #24292f;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    .page {
      box-sizing: border-box;
      max-width: 980px;
      margin: 0 auto;
      padding: 32px;
    }

    .markdown-body {
      box-sizing: border-box;
      min-width: 200px;
      max-width: 100%;
    }

    .markdown-body img {
      max-width: 100%;
      height: auto;
    }

    .markdown-body table {
      display: table;
      width: auto;
      max-width: 100%;
      overflow-x: auto;
    }

    .error {
      border: 1px solid #cf222e;
      background: #ffebe9;
      color: #82071e;
      border-radius: 8px;
      padding: 16px;
    }

    @media (max-width: 767px) {
      .page {
        padding: 18px;
      }
    }

    @media print {
      .page {
        max-width: none;
        padding: 0;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <article id="content" class="markdown-body">
      Loading g07.md…
    </article>
  </main>

  <!-- Markdown parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.12/marked.min.js"></script>

  <!-- Sanitizer -->
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.5/dist/purify.min.js"></script>

  <script>
    const MARKDOWN_FILE = 'g07.md';
    const content = document.getElementById('content');

    marked.setOptions({
      gfm: true,
      breaks: false
    });

    function fixRelativeUrls() {
      const base = new URL(MARKDOWN_FILE, window.location.href);

      content.querySelectorAll('img[src]').forEach(img => {
        const src = img.getAttribute('src');
        if (!src || /^(https?:|data:|mailto:|#)/i.test(src)) return;
        img.src = new URL(src, base).href;
      });

      content.querySelectorAll('a[href]').forEach(a => {
        const href = a.getAttribute('href');
        if (!href || /^(https?:|mailto:|tel:|#)/i.test(href)) return;
        a.href = new URL(href, base).href;
      });
    }

    async function loadMarkdown() {
      try {
        const response = await fetch(MARKDOWN_FILE, { cache: 'no-store' });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status} while loading ${MARKDOWN_FILE}`);
        }

        const markdown = await response.text();
        const html = marked.parse(markdown);
        content.innerHTML = DOMPurify.sanitize(html, {
          USE_PROFILES: { html: true }
        });

        fixRelativeUrls();

        const firstHeading = content.querySelector('h1, h2');
        if (firstHeading) {
          document.title = firstHeading.textContent.trim();
        }
      } catch (err) {
        content.innerHTML = `
          <div class="error">
            <strong>Could not load ${MARKDOWN_FILE}.</strong><br>
            ${String(err.message || err)}
          </div>
        `;
      }
    }

    loadMarkdown();
  </script>
</body>
</html>
