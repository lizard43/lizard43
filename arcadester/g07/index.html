<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Electrohome G07 Guide</title>

  <link id="githubMarkdownCss" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.8.1/github-markdown-light.min.css">

  <style>
    :root {
      --page-max-width: 1500px;
      --page-padding: 32px;
      --bg: #ffffff;
      --text: #24292f;
      --border: #d0d7de;
      --button-bg: #f6f8fa;
      --button-hover: #eef1f4;
      --button-text: #24292f;
      --shadow: rgba(31, 35, 40, 0.15);
    }

    body.dark {
      --bg: #0d1117;
      --text: #c9d1d9;
      --border: #30363d;
      --button-bg: #21262d;
      --button-hover: #30363d;
      --button-text: #c9d1d9;
      --shadow: rgba(0, 0, 0, 0.45);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 4px var(--shadow);
    }

    .toolbar-inner {
      max-width: var(--page-max-width);
      margin: 0 auto;
      padding: 10px var(--page-padding);
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      box-sizing: border-box;
    }

    .toolbar button,
    .toolbar a {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--button-bg);
      color: var(--button-text);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 14px;
      line-height: 1.2;
      text-decoration: none;
      cursor: pointer;
    }

    .toolbar button:hover,
    .toolbar a:hover {
      background: var(--button-hover);
      text-decoration: none;
    }

    .page {
      box-sizing: border-box;
      max-width: var(--page-max-width);
      margin: 0 auto;
      padding: var(--page-padding);
    }

    .markdown-body {
      box-sizing: border-box;
      min-width: 200px;
      max-width: 100%;
      background: transparent;
    }

    .markdown-body img {
      max-width: 100%;
      height: auto;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: zoom-in;
      box-sizing: border-box;
    }

    .markdown-body table {
      display: block;
      width: max-content;
      max-width: 100%;
      overflow-x: auto;
      white-space: nowrap;
    }

    .error {
      border: 1px solid #cf222e;
      background: #ffebe9;
      color: #82071e;
      border-radius: 8px;
      padding: 16px;
    }

    body.dark .error {
      background: #490202;
      color: #ffd8d3;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 22px;
      background: rgba(0, 0, 0, 0.88);
      box-sizing: border-box;
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox img {
      max-width: 96vw;
      max-height: 94vh;
      object-fit: contain;
      background: #fff;
      border-radius: 6px;
      cursor: zoom-out;
    }

    @media (max-width: 767px) {
      :root {
        --page-padding: 18px;
      }

      .toolbar-inner {
        justify-content: center;
        flex-wrap: wrap;
      }
    }

    @media print {
      @page {
        margin: 0.5in;
      }

      body {
        background: #ffffff !important;
        color: #000000 !important;
      }

      .toolbar,
      .lightbox {
        display: none !important;
      }

      .page {
        max-width: none;
        padding: 0;
      }

      .markdown-body {
        color: #000000 !important;
      }

      .markdown-body a {
        color: #000000 !important;
        text-decoration: underline;
      }

      .markdown-body img {
        max-width: 100% !important;
        page-break-inside: avoid;
      }

      .markdown-body table {
        white-space: normal;
        width: 100%;
        max-width: 100%;
        overflow: visible;
        page-break-inside: avoid;
      }

      .markdown-body h1,
      .markdown-body h2,
      .markdown-body h3 {
        page-break-after: avoid;
      }

      .markdown-body pre,
      .markdown-body blockquote {
        page-break-inside: avoid;
      }
    }
  </style>
</head>

<body>
  <div class="toolbar">
    <div class="toolbar-inner">
      <button type="button" id="themeToggle">Dark Mode</button>
      <a href="g07.md">Raw Markdown</a>
      <button type="button" id="printButton">Print / Save PDF</button>
    </div>
  </div>

  <main class="page">
    <article id="content" class="markdown-body">
      Loading g07.md…
    </article>
  </main>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <img id="lightboxImage" alt="">
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.12/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.5/dist/purify.min.js"></script>

  <script>
    const MARKDOWN_FILE = 'g07.md';
    const content = document.getElementById('content');
    const cssLink = document.getElementById('githubMarkdownCss');
    const themeToggle = document.getElementById('themeToggle');
    const lightbox = document.getElementById('lightbox');
    const lightboxImage = document.getElementById('lightboxImage');

    marked.setOptions({
      gfm: true,
      breaks: false
    });

    function setTheme(theme) {
      const dark = theme === 'dark';
      document.body.classList.toggle('dark', dark);
      cssLink.href = dark
        ? 'https://cdn.jsdelivr.net/npm/github-markdown-css@5.8.1/github-markdown-dark.min.css'
        : 'https://cdn.jsdelivr.net/npm/github-markdown-css@5.8.1/github-markdown-light.min.css';
      themeToggle.textContent = dark ? 'Light Mode' : 'Dark Mode';
      localStorage.setItem('g07-theme', theme);
    }

    themeToggle.addEventListener('click', () => {
      setTheme(document.body.classList.contains('dark') ? 'light' : 'dark');
    });

    document.getElementById('printButton').addEventListener('click', () => window.print());

    function fixRelativeUrls() {
      const base = new URL(MARKDOWN_FILE, window.location.href);

      content.querySelectorAll('img[src]').forEach(img => {
        const src = img.getAttribute('src');
        if (!src || /^(https?:|data:|mailto:|#)/i.test(src)) return;
        img.src = new URL(src, base).href;
      });

      content.querySelectorAll('a[href]').forEach(a => {
        const href = a.getAttribute('href');
        if (!href || /^(https?:|mailto:|tel:|#)/i.test(href)) return;
        a.href = new URL(href, base).href;
      });
    }

    function setupImageZoom() {
      content.querySelectorAll('img').forEach(img => {
        img.title = img.title || 'Click to enlarge';
        img.addEventListener('click', () => {
          lightboxImage.src = img.src;
          lightboxImage.alt = img.alt || '';
          lightbox.classList.add('open');
          lightbox.setAttribute('aria-hidden', 'false');
        });
      });

      lightbox.addEventListener('click', () => closeLightbox());

      document.addEventListener('keydown', event => {
        if (event.key === 'Escape') closeLightbox();
      });
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      lightbox.setAttribute('aria-hidden', 'true');
      lightboxImage.src = '';
      lightboxImage.alt = '';
    }

    async function loadMarkdown() {
      try {
        const response = await fetch(MARKDOWN_FILE, { cache: 'no-store' });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status} while loading ${MARKDOWN_FILE}`);
        }

        const markdown = await response.text();
        const rendered = marked.parse(markdown);

        content.innerHTML = DOMPurify.sanitize(rendered, {
          USE_PROFILES: { html: true }
        });

        fixRelativeUrls();
        setupImageZoom();

        const firstHeading = content.querySelector('h1, h2');
        if (firstHeading) {
          document.title = firstHeading.textContent.trim();
        }
      } catch (err) {
        content.innerHTML = `
          <div class="error">
            <strong>Could not load ${MARKDOWN_FILE}.</strong><br>
            ${String(err.message || err)}
          </div>
        `;
      }
    }

    const savedTheme = localStorage.getItem('g07-theme');
    if (savedTheme) {
      setTheme(savedTheme);
    } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
      setTheme('dark');
    } else {
      setTheme('light');
    }

    loadMarkdown();
  </script>
</body>
</html>
