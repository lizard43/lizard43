<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ArcadeSter</title>
</head>

<body style="visibility:hidden;">
    <div class="appShell">
        <header class="topBar">
            <div class="topBarRow">
                <input id="searchInput" class="searchInput" type="search"
                    placeholder="Search title, manufacturer, genre..." aria-label="Search machines" />

                <select id="locationFilter" class="filterSelect" aria-label="Filter by location">
                    <option value="">All locations</option>
                </select>

                <select id="conditionFilter" class="filterSelect" aria-label="Filter by condition">
                    <option value="">All conditions</option>
                </select>

                <button id="settingsBtn" class="addMachineFab settingsFab" type="button" aria-label="Open settings"
                    title="Settings">
                    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <path d="M19.14 12.94c.04-.31.06-.63.06-.94s-.02-.63-.06-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.03 7.03 0 0 0-1.63-.94l-.36-2.54a.5.5 0 0 0-.49-.42h-3.84a.5.5 0 0 0-.49.42l-.36 2.54c-.58.23-1.13.54-1.63.94l-2.39-.96a.5.5 0 0 0-.6.22L2.71 8.84a.5.5 0 0 0 .12.64l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94L2.83 14.52a.5.5 0 0 0-.12.64l1.92 3.32a.5.5 0 0 0 .6.22l2.39-.96c.5.4 1.05.71 1.63.94l.36 2.54a.5.5 0 0 0 .49.42h3.84a.5.5 0 0 0 .49-.42l.36-2.54c.58-.23 1.13-.54 1.63-.94l2.39.96a.5.5 0 0 0 .6-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.03-1.58ZM12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7Z" />
                    </svg>
                </button>
            </div>
        </header>

        <main class="mainLayout">
            <section class="cardsPane">
                <div id="cardsGrid" class="cardsGrid"></div>
                <div id="emptyState" class="emptyState hidden">No machines match your filters.</div>
            </section>

            <aside id="detailPane" class="detailPane" aria-label="Machine details">
                <div class="detailHeader">
                    <h2 id="detailTitle" class="detailTitle">Select a machine</h2>
                    <button id="closeDetailBtn" class="iconBtn" type="button" aria-label="Close details">×</button>
                </div>

                <div id="detailContent" class="detailContent">
                    <div class="detailPlaceholder">
                        Tap a card to view details.
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <div id="mobileOverlay" class="mobileOverlay"></div>


    <div id="settingsOverlay" class="modalOverlay"></div>

    <div id="settingsModal" class="settingsModal" role="dialog" aria-modal="true" aria-labelledby="settingsModalTitle">
        <div class="settingsModalHeader">
            <h2 id="settingsModalTitle" class="settingsModalTitle">Settings</h2>
            <button id="settingsCloseBtn" class="iconBtn settingsModalCloseBtn" type="button" aria-label="Close settings">×</button>
        </div>

        <div class="settingsModalBody">
            <div class="settingsRow">
                <div class="settingsLabel">Version</div>
                <div id="settingsVersion" class="settingsValue">—</div>
            </div>

            <div id="settingsUsernameRow" class="settingsRow"></div>

            <div id="settingsAuthActions" class="settingsAuthActions"></div>
        </div>

        <div class="settingsModalFooter">
            <button id="settingsCancelBtn" class="settingsFooterBtn settingsFooterBtnSecondary" type="button">Cancel</button>
            <button id="settingsSaveBtn" class="settingsFooterBtn" type="button">Save</button>
        </div>
    </div>

    <script src="loader.js"></script>
</body>

</html>
