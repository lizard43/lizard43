<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Pinside Machines Price Guide</title>

  <script src="loader.js"></script>
</head>

<body>
  <header class="topbar" id="topbar" aria-label="Search">
    <div class="searchRow">
      <input id="searchInput" class="searchInput" type="text"
        placeholder="Search title / mfg / date / type / players…" autocomplete="off" />

      <button id="searchPrev" class="searchBtn searchBtnSm" title="Previous match"
        aria-label="Previous match">◀</button>

      <button id="searchNext" class="searchBtn searchBtnSm" title="Next match"
        aria-label="Next match">▶</button>

      <div id="countStatus" class="countPill" aria-live="polite"></div>

      <button id="searchClear" class="searchBtn searchBtnSm" title="Clear" aria-label="Clear search">✕</button>
    </div>

    <!-- Keep searchStatus for accessibility but do not reserve space when empty -->
    <div id="searchStatus" class="searchStatusLine" aria-live="polite"></div>    
  </header>

  <nav class="toolbar-rail" id="rail" aria-label="Navigation">
    <div class="rail-keys" id="railKeys" aria-label="Letter bookmarks">
      <!-- JS populates #, A..Z -->
    </div>
  </nav>

  <main class="stage" id="stage">
    <div class="content" id="content">
      <div class="cards" id="cards"></div>
    </div>
    <div id="toast" class="toast" aria-live="polite"></div>
  </main>

</body>

</html>
