<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RAVster</title>
  <script src="loader.js"></script>
</head>

<body>
  <main class="wrap">
    <!-- Toolbar -->
    <section class="toolbar" role="region" aria-label="Inventory controls">
      <div class="toolbarTop">
        <div class="pillRow" role="group" aria-label="Sort and filters">
          <!-- Sort pills -->
          <button class="pillBtn" id="pillSortDistance" type="button" data-sort="distance">Distance</button>
          <button class="pillBtn" id="pillSortPrice" type="button" data-sort="price">Price</button>
          <button class="pillBtn" id="pillSortEta" type="button" data-sort="eta">ETA</button>

          <span class="pillDivider"></span>

          <!-- Placeholder filter pills (wired later) -->
          <button class="pillBtn pillGhost" id="pillFilterDistance" type="button">Distance: Any</button>
          <button class="pillBtn pillGhost" id="pillFilterPrice" type="button">Price: Any</button>
          <button class="pillBtn pillGhost" id="pillFilterEta" type="button">ETA: Any</button>
        </div>

        <button id="btnCompare" class="iconBtn" type="button" title="Compare selected" aria-label="Compare selected"
          style="display:none">
          <!-- simple compare columns icon -->
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path fill="currentColor"
              d="M4 5h6a2 2 0 0 1 2 2v14H6a2 2 0 0 1-2-2V5zm2 2v12h4V7H6zm12-2h-6a2 2 0 0 0-2 2v14h6a2 2 0 0 0 2-2V5zm-2 2v12h-4V7h4z" />
          </svg>
          <span id="compareCount" class="iconBtnText">0/3</span>
        </button>

        <div class="toolbarCount" id="toolbarCount">Loading…</div>
      </div>

      <div class="toolbarSearch">
        <div class="searchWrap searchWrapWide">
          <input id="search" class="searchInput" type="search" placeholder="Search VIN, model, dealer, colors…"
            autocomplete="off" spellcheck="false" />
          <button id="clearSearch" class="clearBtn" type="button" title="Clear">×</button>
        </div>
      </div>

      <div class="toolbarBottom">
        <div class="status" id="status">Loading…</div>
      </div>
    </section>

    <!-- Cards -->
    <section id="cardsHost" aria-live="polite">
      <div id="cardsGrid" class="cards"></div>
      <div id="compareView" style="display:none"></div>
    </section>

  </main>
</body>

</html>
