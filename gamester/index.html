<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>GameSter</title>
</head>

<body style="visibility:hidden;">
    <div class="appShell">
        <header class="topBar">
            <div class="topBarRow">
                <input id="searchInput" class="searchInput" type="search"
                    placeholder="Search title, manufacturer, genre..." aria-label="Search machines" />

                <select id="conditionFilter" class="filterSelect" aria-label="Filter by condition">
                    <option value="">All conditions</option>
                </select>

                <select id="locationFilter" class="filterSelect" aria-label="Filter by location">
                    <option value="">All locations</option>
                </select>

                <button id="settingsBtn" class="addMachineFab settingsFab" type="button" aria-label="Open settings menu"
                    title="Menu">
                    <span class="settingsFabLine"></span>
                    <span class="settingsFabLine"></span>
                    <span class="settingsFabLine"></span>
                </button>
            </div>
        </header>

        <main class="mainLayout">
            <section class="cardsPane">
                <div id="cardsGrid" class="cardsGrid"></div>
                <div id="emptyState" class="emptyState hidden">No machines match your filters.</div>
            </section>

            <aside id="detailPane" class="detailPane" aria-label="Machine details">
                <div class="detailHeader">
                    <h2 id="detailTitle" class="detailTitle">Select a machine</h2>
                    <button id="closeDetailBtn" class="iconBtn" type="button" aria-label="Close details">×</button>
                </div>

                <div id="detailContent" class="detailContent">
                    <div class="detailPlaceholder">
                        Tap a card to view details.
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <div id="mobileOverlay" class="mobileOverlay"></div>


    <div id="settingsOverlay" class="modalOverlay"></div>

    <div id="settingsModal" class="settingsModal" role="dialog" aria-modal="true" aria-labelledby="settingsModalTitle">
        <div class="settingsModalBody settingsMenuBody">
            <h2 id="settingsModalTitle" class="settingsMenuTitle">Settings</h2>
            <div id="settingsVersion" class="settingsMenuVersion">—</div>
            <div class="settingsMenuDivider"></div>
            <div id="settingsAuthActions" class="settingsAuthActions settingsMenuActions"></div>
            <div class="settingsMenuDivider"></div>
            <div id="settingsUsernameRow" class="settingsRow settingsMenuAccount"></div>
        </div>
    </div>

    <div id="booksOverlay" class="modalOverlay"></div>

    <div id="booksModal" class="editModal booksModal" role="dialog" aria-modal="true" aria-labelledby="booksModalTitle">
        <div class="settingsModalHeader">
            <h2 id="booksModalTitle" class="settingsModalTitle"></h2>
            <button id="booksCloseBtn" class="iconBtn settingsModalCloseBtn" type="button"
                aria-label="Close books">×</button>
        </div>

        <div id="booksModalBody" class="editModalBody booksModalBody">
            <div id="booksContent" class="booksContent">
                <div class="detailMeta">Loading books…</div>
            </div>
        </div>

        <div class="settingsModalFooter">
            <button id="booksCancelBtn" class="settingsFooterBtn settingsFooterBtnSecondary"
                type="button">Close</button>
        </div>
    </div>

    <div id="editOverlay" class="modalOverlay"></div>

    <div id="editModal" class="editModal" role="dialog" aria-modal="true" aria-labelledby="editModalTitle">
        <div class="settingsModalHeader">
            <h2 id="editModalTitle" class="settingsModalTitle">Edit Game</h2>
            <button id="editCloseBtn" class="iconBtn settingsModalCloseBtn" type="button"
                aria-label="Close edit dialog">×</button>
        </div>

        <form id="editForm" class="editForm">
            <div class="editModalBody">
                <div class="editField editFieldReadOnly">
                    <label class="settingsLabel" for="editGameId">Game ID</label>
                    <input id="editGameId" class="settingsInput" type="text" readonly>
                </div>

                <div class="editFieldGrid">
                    <div class="editField">
                        <label class="settingsLabel" for="editTitle">Title</label>
                        <input id="editTitle" class="settingsInput" type="text">
                    </div>
                    <div class="editField">
                        <label class="settingsLabel" for="editPgId">pgID</label>
                        <input id="editPgId" class="settingsInput" type="text">
                    </div>
                </div>

                <div class="editFieldGrid">
                    <div class="editField">
                        <label class="settingsLabel" for="editLocation">Location</label>
                        <input id="editLocation" class="settingsInput" type="text">
                    </div>
                    <div class="editField">
                        <label class="settingsLabel" for="editCondition">Condition</label>
                        <input id="editCondition" class="settingsInput" type="text">
                    </div>
                </div>

                <div class="editField">
                    <label class="settingsLabel" for="editPhotoUrl">Photo</label>
                    <input id="editPhoto" type="hidden">
                    <div class="editPhotoControl">
                        <div class="editPhotoActionRow">
                            <div id="editPhotoDropZone" class="editPhotoDropZone" role="button" tabindex="0"
                                aria-label="Drop image or choose photo">
                                <span>Drop image or Click to Browse</span>
                            </div>
                            <button id="editPhotoCameraBtn" class="expenseAddBtn expenseAddBtnTop editPhotoCameraBtn"
                                type="button">
                                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                                    <path
                                        d="M9 4l1.4 2H15a2 2 0 0 1 2 2h1a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h1a2 2 0 0 1 2-2Zm3 4.5A4.5 4.5 0 1 0 16.5 13 4.5 4.5 0 0 0 12 8.5Zm0 2A2.5 2.5 0 1 1 9.5 13 2.5 2.5 0 0 1 12 10.5Z" />
                                </svg>
                                <span>Camera</span>
                            </button>
                        </div>
                        <div class="editField photoUrlField editPhotoUrlField">
                            <textarea id="editPhotoUrl"
                                class="settingsInput editTextarea editPhotoUrlTextarea"></textarea>
                            <div id="editPhotoStatus" class="photoUploadStatus"></div>
                        </div>
                    </div>
                </div>

                <div class="editField">
                    <label class="settingsLabel" for="editNotes">Notes</label>
                    <textarea id="editNotes" class="settingsInput editTextarea"></textarea>
                </div>

                <div class="editFieldGrid">
                    <div class="editField">
                        <label class="settingsLabel" for="editPurchaseDate">Purchase Date</label>
                        <input id="editPurchaseDate" class="settingsInput" type="date">
                    </div>
                    <div class="editField">
                        <label class="settingsLabel" for="editPurchasePrice">Purchase Price</label>
                        <input id="editPurchasePrice" class="settingsInput" type="number" step="0.01">
                    </div>
                </div>

                <div class="editField">
                    <label class="settingsLabel" for="editPurchaseFrom">Purchase From</label>
                    <textarea id="editPurchaseFrom" class="settingsInput editTextarea"></textarea>
                </div>

                <div class="editFieldGrid">
                    <div class="editField">
                        <label class="settingsLabel" for="editSoldDate">Sold Date</label>
                        <input id="editSoldDate" class="settingsInput" type="date">
                    </div>
                    <div class="editField">
                        <label class="settingsLabel" for="editSoldPrice">Sold Price</label>
                        <input id="editSoldPrice" class="settingsInput" type="number" step="0.01">
                    </div>
                </div>

                <div class="editField">
                    <label class="settingsLabel" for="editSoldTo">Sold To</label>
                    <textarea id="editSoldTo" class="settingsInput editTextarea"></textarea>
                </div>
            </div>

            <div class="settingsModalFooter">
                <button id="editCancelBtn" class="settingsFooterBtn settingsFooterBtnSecondary"
                    type="button">Cancel</button>
                <button id="editSaveBtn" class="settingsFooterBtn" type="submit">Save</button>
            </div>
        </form>
    </div>


    <div id="expenseOverlay" class="modalOverlay"></div>

    <div id="expenseModal" class="editModal expenseModal" role="dialog" aria-modal="true"
        aria-labelledby="expenseModalTitle">
        <div class="settingsModalHeader">
            <h2 id="expenseModalTitle" class="settingsModalTitle">Edit Expenses</h2>
            <button id="expenseCloseBtn" class="iconBtn settingsModalCloseBtn" type="button"
                aria-label="Close expense dialog">×</button>
        </div>

        <form id="expenseForm" class="editForm expenseForm">
            <div class="editModalBody expenseModalBody">
                <div class="editField editFieldReadOnly">
                    <label class="settingsLabel">Game ID</label>
                    <div id="expenseGameId" class="settingsLoggedInValue">—</div>
                </div>

                <div id="expenseRows" class="expenseEditorRows"></div>
            </div>

            <div class="settingsModalFooter">
                <button id="expenseCancelBtn" class="settingsFooterBtn settingsFooterBtnSecondary"
                    type="button">Cancel</button>
                <button id="expenseSaveBtn" class="settingsFooterBtn" type="submit">Save</button>
            </div>
        </form>
    </div>



    <div id="photoOverlay" class="modalOverlay"></div>

    <div id="photoModal" class="editModal expenseModal" role="dialog" aria-modal="true"
        aria-labelledby="photoModalTitle">
        <div class="settingsModalHeader">
            <h2 id="photoModalTitle" class="settingsModalTitle">Edit Photos</h2>
            <button id="photoCloseBtn" class="iconBtn settingsModalCloseBtn" type="button"
                aria-label="Close photo dialog">×</button>
        </div>

        <form id="photoForm" class="editForm expenseForm">
            <div class="editModalBody expenseModalBody">
                <div class="editField editFieldReadOnly">
                    <label class="settingsLabel">Game ID</label>
                    <div id="photoGameId" class="settingsLoggedInValue">—</div>
                </div>

                <div id="photoRows" class="expenseEditorRows"></div>
            </div>

            <div class="settingsModalFooter">
                <button id="photoCancelBtn" class="settingsFooterBtn settingsFooterBtnSecondary"
                    type="button">Cancel</button>
                <button id="photoSaveBtn" class="settingsFooterBtn" type="submit">Save</button>
            </div>
        </form>
    </div>

    <div id="photoViewerOverlay" class="modalOverlay"></div>

    <div id="photoViewerModal" class="photoViewerModal" role="dialog" aria-modal="true"
        aria-labelledby="photoViewerCaption">
        <button id="photoViewerCloseBtn" class="iconBtn photoViewerCloseBtn" type="button"
            aria-label="Close photo viewer">×</button>
        <button id="photoViewerPrevBtn" class="photoViewerNavBtn photoViewerNavBtnPrev hidden" type="button"
            aria-label="Previous photo">‹</button>
        <button id="photoViewerNextBtn" class="photoViewerNavBtn photoViewerNavBtnNext hidden" type="button"
            aria-label="Next photo">›</button>
        <div class="photoViewerBody">
            <img id="photoViewerImage" class="photoViewerImage" src="" alt="Photo">
            <div id="photoViewerCaption" class="photoViewerCaption"></div>
        </div>
    </div>


    <script src="loader.js"></script>
</body>

</html>
